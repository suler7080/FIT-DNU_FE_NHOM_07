<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceBoard - Kết Nối Freelancer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark">
    <!-- Navbar Component -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">FreelanceBoard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">Quản Trị Viên</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header Section (Utility classes: text-center, py-5, bg-white, shadow-sm, mb-4) -->
    <header class="text-center py-5 bg-white shadow-sm mb-4">
        <div class="container">
            <h1 class="display-5 fw-bold text-primary">Tìm Kiếm Dịch Vụ Freelance</h1>
            <p class="lead text-muted">Kết nối với những chuyên gia hàng đầu trong mọi lĩnh vực</p>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="container mb-5">
        <!-- Search and Filter Form -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-10">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="searchForm" class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label for="keyword" class="form-label fw-semibold">Từ khóa</label>
                                <input type="text" id="keyword" class="form-control" placeholder="Tên dịch vụ...">
                            </div>
                            <div class="col-md-3">
                                <label for="category" class="form-label fw-semibold">Danh mục</label>
                                <select id="category" class="form-select">
                                    <option value="">Tất cả</option>
                                    <option value="IT">IT & Lập trình</option>
                                    <option value="Design">Thiết kế đồ họa</option>
                                    <option value="Writing">Viết lách</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="maxPrice" class="form-label fw-semibold">Mức giá tối đa</label>
                                <input type="number" id="maxPrice" class="form-control" placeholder="VNĐ">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100 fw-bold">Tìm Kiếm</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center my-5" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Đang tải...</span>
            </div>
        </div>

        <!-- Services Grid -->
        <div class="row g-4" id="servicesContainer">
            <!-- Dịch vụ sẽ được render tại đây bằng Javascript -->
        </div>
    </main>

    <!-- Request Modal Component -->
    <div class="modal fade" id="requestModal" tabindex="-1" aria-labelledby="requestModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="requestModalLabel">Gửi Yêu Cầu Dịch Vụ</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="requestForm" novalidate>
                        <input type="hidden" id="serviceId">
                        
                        <div class="mb-3">
                            <label for="clientName" class="form-label fw-semibold">Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="clientName" required>
                            <div class="invalid-feedback">
                                Vui lòng nhập họ và tên của bạn.
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="clientEmail" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="clientEmail" required>
                            <div class="invalid-feedback">
                                Vui lòng nhập đúng định dạng email.
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="message" class="form-label fw-semibold">Nội dung yêu cầu</label>
                            <textarea class="form-control" id="message" rows="3" placeholder="Mô tả chi tiết mong muốn của bạn..."></textarea>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold">Gửi Yêu Cầu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Component -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium">
                    Gửi yêu cầu thành công! Chúng tôi sẽ liên hệ lại sớm nhất.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Vanilla JS Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
