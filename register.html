<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - GigGo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100">
    <!-- Navbar Component -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
                <img src="img/logo-giggo.png" alt="GigGo Logo" height="45">
                <span class="text-primary">GigGo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Trang Chủ</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card auth-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-success">GigGo</h3>
                            <p class="text-muted">Tạo tài khoản mới</p>
                        </div>
                        <div id="registerAlert" class="alert alert-danger d-none" role="alert"></div>
                        <div id="registerSuccess" class="alert alert-success d-none" role="alert">
                            Đăng ký thành công! Đang chuyển hướng đến trang đăng nhập...
                        </div>
                        <form id="registerForm" novalidate>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label fw-semibold">Họ và Tên</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" id="name" required placeholder="Nguyễn Văn A">
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="role" class="form-label fw-semibold">Bạn là ai?</label>
                                    <select class="form-select" id="role" required>
                                        <option value="client">Khách hàng (Tìm Freelancer)</option>
                                        <option value="freelancer">Freelancer (Tìm việc)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3 d-none" id="skillsWrapper">
                                <label for="skills" class="form-label fw-semibold">Kỹ năng chuyên môn</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-tools"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="skills" placeholder="VD: HTML, CSS, React, Photoshop">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="email" required placeholder="name@example.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" required placeholder="Tối thiểu 6 ký tự">
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold" id="btnRegister">Đăng Ký</button>
                            </div>
                            <div class="text-center mt-4">
                                <span class="text-muted">Đã có tài khoản?</span>
                                <a href="login.html" class="text-primary fw-semibold text-decoration-none">Đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Vanilla JS Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = Auth.getDashboardUrl(Auth.getCurrentUser().role);
            }

            const roleSelect = document.getElementById('role');
            const skillsWrapper = document.getElementById('skillsWrapper');
            
            roleSelect.addEventListener('change', function() {
                if(this.value === 'freelancer') {
                    skillsWrapper.classList.remove('d-none');
                } else {
                    skillsWrapper.classList.add('d-none');
                }
            });

            const registerForm = document.getElementById('registerForm');
            const alertBox = document.getElementById('registerAlert');
            const successBox = document.getElementById('registerSuccess');
            const btnRegister = document.getElementById('btnRegister');

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alertBox.classList.add('d-none');
                
                const name = document.getElementById('name').value.trim();
                const role = document.getElementById('role').value;
                const skills = document.getElementById('skills').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                // Validate
                if (!name || !email || !password) {
                    alertBox.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                    alertBox.classList.remove('d-none');
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    alertBox.textContent = 'Email không hợp lệ.';
                    alertBox.classList.remove('d-none');
                    return;
                }

                if (password.length < 6) {
                    alertBox.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                    alertBox.classList.remove('d-none');
                    return;
                }

                btnRegister.disabled = true;
                btnRegister.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang xử lý...';

                const newUser = {
                    name: name,
                    role: role,
                    email: email,
                    password: password, // Lưu ý: Trong thực tế ko bao giờ gửi password text thẳng thế này
                    skills: role === 'freelancer' ? skills : ''
                };

                // Gọi POST MockAPI (Mô phỏng)
                api.post('/users', newUser)
                    .then(response => {
                        successBox.classList.remove('d-none');
                        registerForm.reset();
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    })
                    .catch(err => {
                        console.error(err);
                        // Fallback để test nếu MockAPI lỗi/không có endpoint /users
                        alertBox.textContent = 'Có lỗi xảy ra khi gọi API. Chuyển sang mô phỏng đăng ký thành công.';
                        alertBox.classList.remove('d-none');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    })
                    .finally(() => {
                        btnRegister.disabled = false;
                        btnRegister.textContent = 'Đăng Ký';
                    });
            });
        });
    </script>
</body>
</html>
