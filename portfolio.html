<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Năng Lực - FreelanceBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark">
    <!-- Navbar Component -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <div class="bg-primary text-white rounded p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                    <i class="bi bi-layers-fill fs-5"></i>
                </div>
                <span class="text-primary">Freelance</span><span class="text-dark">Board</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Auth items will be dynamically injected here -->
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">Hồ Sơ Năng Lực Của Bạn</h2>
            <a href="freelancer-dashboard.html" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Quay lại Dashboard
            </a>
        </div>

        <div class="row g-4">
            <!-- Form Chỉnh Sửa Hồ Sơ -->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold mb-4 border-bottom pb-3">Cập Nhật Thông Tin</h4>
                        <form id="portfolioForm">
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ và Tên</label>
                                    <input type="text" id="p_name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" id="p_email" class="form-control" disabled>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Kỹ năng chuyên môn (cách nhau bởi dấu phẩy)</label>
                                <input type="text" id="p_skills" class="form-control" placeholder="VD: ReactJS, Figma, SEO..." required>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Giá cơ sở (VNĐ)</label>
                                    <input type="number" id="p_price" class="form-control" placeholder="Mức giá có thể thương lượng">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">SĐT Zalo</label>
                                    <input type="text" id="p_zalo" class="form-control" placeholder="09xxxxxxx">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Liên kết Facebook</label>
                                <input type="url" id="p_facebook" class="form-control" placeholder="https://facebook.com/yourprofile">
                            </div>

                            <h5 class="fw-bold mb-3 mt-5">Các Thành Tựu Nổi Bật (Achievements)</h5>
                            <div class="mb-4">
                                <label class="form-label fw-semibold text-muted">Thêm URL hình ảnh minh họa (Mỗi dòng 1 URL)</label>
                                <textarea id="p_achievements" class="form-control" rows="4" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"></textarea>
                            </div>

                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-primary fw-bold py-3" id="btnSavePortfolio">
                                    <i class="bi bi-save me-2"></i>Lưu Hồ Sơ
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Preview/Showcase Area -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 h-100 bg-primary text-white">
                    <div class="card-body p-4 p-md-5 d-flex flex-column">
                        <div class="text-center mb-4">
                            <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 100px; height: 100px;" id="avatarPreview">
                                <!-- Avatar injected via JS -->
                            </div>
                            <h3 class="fw-bold mb-1" id="previewName">Tên Freelancer</h3>
                            <p class="text-white-50" id="previewSkills">Chưa có kỹ năng</p>
                        </div>
                        
                        <div class="bg-white bg-opacity-10 rounded-3 p-3 mb-4 text-center">
                            <p class="mb-1 text-white-50 small text-uppercase fw-semibold">Giá cơ sở</p>
                            <h4 class="fw-bold mb-0 text-warning" id="previewPrice">Đang cập nhật</h4>
                        </div>

                        <div class="d-flex justify-content-center gap-3 mb-4">
                            <a href="#" id="previewZalo" class="btn btn-light rounded-circle" target="_blank" style="width:45px; height:45px; display:flex; align-items:center; justify-content:center;">
                                <i class="bi bi-telephone-fill text-primary"></i>
                            </a>
                            <a href="#" id="previewFacebook" class="btn btn-light rounded-circle" target="_blank" style="width:45px; height:45px; display:flex; align-items:center; justify-content:center;">
                                <i class="bi bi-facebook text-primary"></i>
                            </a>
                        </div>

                        <h5 class="fw-bold mb-3 border-bottom border-light pb-2">Thư viện của tôi</h5>
                        <div id="previewCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner rounded-3 shadow-sm" id="carouselInnerImages">
                                <!-- Images injected via JS -->
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#previewCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#previewCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification Component -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="successToast" class="toast custom-toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium">
                    <i class="bi bi-check-circle-fill me-2"></i> Lưu hồ sơ thành công!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.checkAuth('freelancer')) return;
            
            const currentUser = Auth.getCurrentUser();
            
            // Render initial preview
            const updatePreview = (user) => {
                document.getElementById('previewName').textContent = user.name || 'Chưa cập nhật';
                document.getElementById('previewSkills').textContent = user.skills || 'Chưa có kỹ năng';
                document.getElementById('previewPrice').textContent = user.negotiablePrice ? Utils.formatCurrency(user.negotiablePrice) : 'Thương lượng';
                
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random&size=100`;
                document.getElementById('avatarPreview').innerHTML = `<img src="${avatarUrl}" class="rounded-circle" width="90" height="90">`;
                
                document.getElementById('previewZalo').href = user.zaloPhone ? `tel:${user.zaloPhone}` : '#';
                document.getElementById('previewFacebook').href = user.facebookUrl || '#';

                // Carousel Achievements
                const carouselInner = document.getElementById('carouselInnerImages');
                carouselInner.innerHTML = '';
                if (user.achievements && user.achievements.length > 0) {
                    user.achievements.forEach((url, idx) => {
                        carouselInner.innerHTML += `
                            <div class="carousel-item ${idx === 0 ? 'active' : ''}">
                                <img src="${url}" class="d-block w-100" alt="Achievement" style="height: 200px; object-fit: cover;">
                            </div>
                        `;
                    });
                } else {
                    carouselInner.innerHTML = `
                        <div class="carousel-item active">
                            <div class="d-flex align-items-center justify-content-center bg-white text-primary" style="height: 200px;">
                                <span>Chưa có ảnh thành tựu</span>
                            </div>
                        </div>
                    `;
                }
            };

            // Load data into form
            document.getElementById('p_name').value = currentUser.name || '';
            document.getElementById('p_email').value = currentUser.email || '';
            document.getElementById('p_skills').value = currentUser.skills || '';
            document.getElementById('p_price').value = currentUser.negotiablePrice || '';
            document.getElementById('p_zalo').value = currentUser.zaloPhone || '';
            document.getElementById('p_facebook').value = currentUser.facebookUrl || '';
            document.getElementById('p_achievements').value = (currentUser.achievements || []).join('\n');
            
            updatePreview(currentUser);

            // Handle Submit
            document.getElementById('portfolioForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnSavePortfolio');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang lưu...';

                const updatedData = {
                    name: document.getElementById('p_name').value.trim(),
                    skills: document.getElementById('p_skills').value.trim(),
                    negotiablePrice: document.getElementById('p_price').value.trim(),
                    zaloPhone: document.getElementById('p_zalo').value.trim(),
                    facebookUrl: document.getElementById('p_facebook').value.trim(),
                    achievements: document.getElementById('p_achievements').value.split('\n').map(u => u.trim()).filter(u => u !== '')
                };

                api.put(`/users/${currentUser.id}`, updatedData)
                    .then(updatedUser => {
                        Auth.setCurrentUser(updatedUser); // Cập nhật localStorage
                        updatePreview(updatedUser);
                        
                        const toastEl = document.getElementById('successToast');
                        const toast = new bootstrap.Toast(toastEl);
                        toast.show();
                    })
                    .catch(err => {
                        console.error('Lỗi khi lưu profile:', err);
                        alert('Có lỗi xảy ra khi lưu hồ sơ.');
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-save me-2"></i>Lưu Hồ Sơ';
                    });
            });
        });
    </script>
</body>
</html>
