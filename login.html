<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - GigGo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100">
    <!-- Navbar Component -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
                <img src="img/logo-giggo.png" alt="GigGo Logo" height="45">
                <span class="text-primary">GigGo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Trang Chủ</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card">
                    <div class="auth-header">
                        <h2 class="fw-bold mb-1">Đăng nhập</h2>
                        <p class="mb-0 text-white-50">Chào mừng trở lại với GigGo</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                        <form id="loginForm" novalidate>
                            <div class="mb-4">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="email" required placeholder="name@example.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" required placeholder="••••••••">
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold" id="btnLogin">Đăng Nhập</button>
                            </div>
                            <div class="text-center mt-4">
                                <span class="text-muted">Chưa có tài khoản?</span>
                                <a href="register.html" class="text-primary fw-semibold text-decoration-none">Đăng ký ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Vanilla JS Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = Auth.getDashboardUrl(Auth.getCurrentUser().role); // Đã đăng nhập thì về trang dashboard
            }

            const loginForm = document.getElementById('loginForm');
            const alertBox = document.getElementById('loginAlert');
            const btnLogin = document.getElementById('btnLogin');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alertBox.classList.add('d-none');
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!email || !password) {
                    alertBox.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                    alertBox.classList.remove('d-none');
                    return;
                }

                btnLogin.disabled = true;
                btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang xử lý...';

                // Lấy danh sách users từ MockAPI để kiểm tra đăng nhập (Mô phỏng)
                api.get('/users')
                    .then(users => {
                        const user = users.find(u => u.email === email && u.password === password);
                        if (user) {
                            // Tạo object lưu trữ loại bỏ password
                            const userInfo = {
                                id: user.id,
                                email: user.email,
                                name: user.name,
                                role: user.role
                            };
                            Auth.setCurrentUser(userInfo);
                            
                            // Redirect
                            window.location.href = Auth.getDashboardUrl(userInfo.role);
                        } else {
                            alertBox.textContent = 'Email hoặc mật khẩu không đúng.';
                            alertBox.classList.remove('d-none');
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        // Fallback check for offline testing or MockAPI failure
                        if (email === 'admin@gmail.com' && password === '123456') {
                            Auth.setCurrentUser({ id: '999', name: 'Admin Tạm', email: email, role: 'admin' });
                            window.location.href = 'admin.html';
                        } else if (email === 'client@gmail.com' && password === '123456') {
                            Auth.setCurrentUser({ id: '888', name: 'Khách Tạm', email: email, role: 'client' });
                            window.location.href = 'client-dashboard.html';
                        } else if (email === 'freelancer@gmail.com' && password === '123456') {
                            Auth.setCurrentUser({ id: '777', name: 'Freelancer Tạm', email: email, role: 'freelancer', skills: 'HTML, CSS' });
                            window.location.href = 'freelancer-dashboard.html';
                        } else {
                            alertBox.textContent = 'Lỗi kết nối hoặc thông tin không đúng.';
                            alertBox.classList.remove('d-none');
                        }
                    })
                    .finally(() => {
                        btnLogin.disabled = false;
                        btnLogin.textContent = 'Đăng Nhập';
                    });
            });
        });
    </script>
</body>
</html>
